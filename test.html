<!DOCTYPE html>
<html>
<head>
<title>CupX Auth</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>

<body>

<h2>CupX Auth</h2>

<input id="username" placeholder="username">
<input id="password" placeholder="password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<p id="status"></p>

<script>

console.log("Loaded")

const supabaseUrl = "https://astnfrwbebzxcxlltpkn.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdG5mcndiZWJ6eGN4bGx0cGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjg2OTIsImV4cCI6MjA5MDgwNDY5Mn0.gqp08ROPoDZWyE0KVtV-VCFdTmEXl4HOEL8v7Xjd0I4"

const supabaseClient = window.supabase.createClient(
supabaseUrl,
supabaseKey
)

async function signup(){

console.log("Signup Clicked")

const username = document.getElementById("username").value
const password = document.getElementById("password").value

const { data, error } = await supabaseClient
.from("users")
.insert([
{
username: username,
password: password,
upi_id: username + "@cupx",
balance: 1000
}
])

if(error){
console.log(error)
document.getElementById("status").innerText = "Signup failed"
}else{
document.getElementById("status").innerText = "Signup success"
}

}

async function login(){

console.log("Login clicked")

const username = document.getElementById("username").value
const password = document.getElementById("password").value

const { data, error } = await supabaseClient
.from("users")
.select("*")
.eq("username", username)
.eq("password", password)
.single()

if(error){
console.log(error)
document.getElementById("status").innerText = "Login failed"
}else{
document.getElementById("status").innerText = "Login success"
console.log(data)
}

}

</script>

</body>
</html>
