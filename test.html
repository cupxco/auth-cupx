<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CupX Auth Test</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
font-family: Arial;
padding: 40px;
background: #0f172a;
color: white;
}

input {
display: block;
margin: 10px 0;
padding: 10px;
width: 300px;
}

button {
padding: 10px 20px;
margin-top: 10px;
cursor: pointer;
}
</style>

</head>

<body>

<h2>CupX Auth Test</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<p id="status"></p>

<script>

const supabaseUrl = "https://astnfrwbebzxcxlltpkn.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdG5mcndiZWJ6eGN4bGx0cGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjg2OTIsImV4cCI6MjA5MDgwNDY5Mn0.gqp08ROPoDZWyE0KVtV-VCFdTmEXl4HOEL8v7Xjd0I4"

const supabase = supabase.createClient(supabaseUrl, supabaseKey)

async function signup() {

const username = document.getElementById("username").value
const password = document.getElementById("password").value

const { data, error } = await supabase
.from("users")
.insert([
{
username: username,
password: password,
upi_id: username + "@cupx",
balance: 1000
}
])

if(error){
document.getElementById("status").innerText = "Signup failed"
console.log(error)
}else{
document.getElementById("status").innerText = "Signup successful"
}

}

async function login() {

const username = document.getElementById("username").value
const password = document.getElementById("password").value

const { data, error } = await supabase
.from("users")
.select("*")
.eq("username", username)
.eq("password", password)
.single()

if(error){
document.getElementById("status").innerText = "Login failed"
console.log(error)
}else{

localStorage.setItem("cupx_user", JSON.stringify(data))

document.getElementById("status").innerText = "Login successful"

console.log(data)

}

}

</script>

</body>
</html>
