<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auth | CupX Corporation</title>
<meta name="description" content="Authentication portal for CupX ecosystem." />

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:#e5e7eb;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
background:#020617;
padding:20px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

header a{
color:#38bdf8;
text-decoration:none;
font-size:14px;
}

.page{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.box{
background:#020617;
padding:30px;
width:100%;
max-width:380px;
border-radius:8px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
font-size:14px;
opacity:.85;
margin-bottom:20px;
}

.input-group{
position:relative;
margin-bottom:16px;
}

input{
width:100%;
padding:10px 12px;
border-radius:4px;
border:none;
outline:none;
font-size:14px;
background:#1e293b;
color:#e5e7eb;
}

.eye{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
opacity:.7;
display:flex;
align-items:center;
justify-content:center;
}

button{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
width:100%;
padding:10px;
background:#38bdf8;
color:#020617;
border:none;
border-radius:4px;
font-size:15px;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

button:hover{
background:#0ea5e9;
}

.google{
background:white;
color:black;
}

.switch{
text-align:center;
font-size:13px;
cursor:pointer;
opacity:.8;
margin-top:10px;
}

.error{
color:#ef4444;
font-size:13px;
margin-bottom:10px;
}

footer{
background:#020617;
border-top:1px solid #1e293b;
padding:20px;
text-align:center;
font-size:13px;
opacity:.7;
margin-top:auto;
}

</style>

</head>

<body>

<header>
<div class="logo">CupX Corporation</div>
<a id="backBtn" href="https://cupx.in">← Back to Home</a>
</header>

<div class="page">

<div class="box">

<h1 id="title">Sign in</h1>
<p class="subtitle">Access CupX ecosystem</p>

<div id="message"></div>

<button class="google" onclick="googleLogin()">

<svg width="18" height="18" viewBox="0 0 48 48">
<path fill="#EA4335" d="M24 9.5c3.4 0 6.5 1.2 8.9 3.2l6.6-6.6C35.7 2.3 30.2 0 24 0 14.6 0 6.4 5.4 2.4 13.2l7.7 6C12.2 13.2 17.6 9.5 24 9.5z"/>
<path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-2.7-.4-3.9H24v7.3h12.7c-.3 1.8-1.9 4.5-5.3 6.3l8.1 6.3c4.7-4.3 7-10.7 7-16z"/>
<path fill="#FBBC05" d="M10.1 28.8c-.5-1.4-.8-2.9-.8-4.3s.3-2.9.8-4.3l-7.7-6C.9 17.2 0 20.5 0 24.5s.9 7.3 2.4 10.3l7.7-6z"/>
<path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-8.1-6.3c-2.2 1.5-5.1 2.5-7.1 2.5-6.4 0-11.8-3.7-13.8-9.2l-7.7 6C6.4 42.6 14.6 48 24 48z"/>
</svg>

Continue with Google

</button>

<form id="form" onsubmit="return false;">

<div id="fullnameField" style="display:none;">
<div class="input-group">
<input id="fullname" placeholder="Full Name">
</div>
</div>

<div class="input-group">
<input id="username" placeholder="Username">
</div>

<div class="input-group">

<input type="password" id="password" placeholder="Password">

<div class="eye" onclick="togglePassword(this,'password')">
<svg viewBox="0 0 24 24" width="18" height="18">
<path fill="none" stroke="#94a3b8" stroke-width="2"
d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"
fill="none" stroke="#94a3b8" stroke-width="2"/>
</svg>
</div>

</div>

<div id="confirmField" style="display:none;">
<div class="input-group">
<input type="password" id="confirm" placeholder="Confirm Password">
<div class="eye" onclick="togglePassword(this,'confirm')">
<svg viewBox="0 0 24 24" width="18" height="18">
<path fill="none" stroke="#94a3b8" stroke-width="2"
d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"
fill="none" stroke="#94a3b8" stroke-width="2"/>
</svg>
</div>
</div>
</div>

<button onclick="submitForm()">Continue</button>

</form>

<div class="switch" onclick="toggleMode()" id="switchText">
Don't have account? Signup
</div>

</div>

</div>

<footer>
© CupX Corporation • Authentication System
</footer>

<script>

const supabaseUrl="https://astnfrwbebzxcxlltpkn.supabase.co"
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdG5mcndiZWJ6eGN4bGx0cGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjg2OTIsImV4cCI6MjA5MDgwNDY5Mn0.gqp08ROPoDZWyE0KVtV-VCFdTmEXl4HOEL8v7Xjd0I4"

const supabase=window.supabase.createClient(
supabaseUrl,
supabaseKey
)

let signup=false

const params=new URLSearchParams(window.location.search)
const from=params.get("from")

if(from){
document.getElementById("backBtn").href=`https://${from}.cupx.in`
}

function redirectBack(){
if(from){
window.location.href=`https://${from}.cupx.in`
}else{
window.location.href="https://cupx.in"
}
}

function toggleMode(){
signup=!signup

document.getElementById("title").innerText=
signup?"Sign up":"Sign in"

document.getElementById("fullnameField").style.display=
signup?"block":"none"

document.getElementById("confirmField").style.display=
signup?"block":"none"

document.getElementById("switchText").innerText=
signup?"Already have account? Signin":
"Don't have account? Signup"
}

function togglePassword(el,id){

const input=document.getElementById(id)

if(input.type==="password"){
input.type="text"
}else{
input.type="password"
}

}

function showError(msg){
document.getElementById("message").innerHTML=`<div class="error">${msg}</div>`
}

async function submitForm(){

const username=document.getElementById("username").value
const password=document.getElementById("password").value
const confirm=document.getElementById("confirm").value
const fullname=document.getElementById("fullname").value

if(signup){

if(!fullname){
showError("Full name required")
return
}

if(password!==confirm){
showError("Passwords do not match")
return
}

const {error}=await supabase
.from("users")
.insert([{
username,
full_name:fullname,
password,
upi_id:username+"@cupx"
}])

if(error){
showError(error.message)
}else{
redirectBack()
}

}else{

const {data,error}=await supabase
.from("users")
.select("*")
.eq("username",username)
.eq("password",password)
.single()

if(error||!data){
showError("Invalid credentials")
}else{

localStorage.setItem("cupx_user",JSON.stringify(data))

redirectBack()

}

}

}

async function googleLogin(){

await supabase.auth.signInWithOAuth({
provider:"google",
options:{
redirectTo:window.location.href
}
})

}

supabase.auth.getSession().then(({data})=>{
if(data.session){
redirectBack()
}
})

</script>

</body>
</html>
